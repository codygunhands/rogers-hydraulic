name: rogers-hydraulic
region: nyc
services:
  - name: web
    git:
      repo_clone_url: https://github.com/codygunhands/rogers-hydraulic.git
      branch: main
    build_command: npm ci && npm run build
    run_command: npm run start
    environment_slug: node-js
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
    routes:
      - path: /
    health_check:
      http_path: /
