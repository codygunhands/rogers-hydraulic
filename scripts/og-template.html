<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; }
      body {
        background: #1e2329;
        font-family: "Oswald", system-ui, sans-serif;
        position: relative;
        overflow: hidden;
      }
      .bar { position: absolute; left: 0; right: 0; height: 10px; background: #d3ff00; }
      .bar.top { top: 0; }
      .bar.bottom { bottom: 0; }
      .wrap { padding: 78px 80px; height: 100%; display: flex; flex-direction: column; }
      .block {
        display: inline-flex;
        align-items: center;
        background: #14181c;
        border: 5px solid #d3ff00;
        padding: 14px 30px;
        line-height: 1;
      }
      .block span { font-weight: 700; font-size: 96px; letter-spacing: 0.02em; text-transform: uppercase; }
      .rogers { color: #f4f4f1; }
      .hydraulic { color: #d3ff00; }
      .sub {
        margin-top: 20px;
        font-weight: 400;
        font-size: 27px;
        letter-spacing: 0.26em;
        text-transform: uppercase;
        color: #aeb6bf;
      }
      .spacer { flex: 1; }
      .promise {
        font-weight: 700;
        font-size: 46px;
        letter-spacing: 0.01em;
        text-transform: uppercase;
        color: #d3ff00;
      }
      .area {
        margin-top: 22px;
        font-weight: 400;
        font-size: 27px;
        letter-spacing: 0.03em;
        color: #f4f4f1;
      }
      .svc {
        margin-top: 8px;
        font-weight: 400;
        font-size: 20px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #aeb6bf;
      }
    </style>
  </head>
  <body>
    <div class="bar top"></div>
    <div class="bar bottom"></div>
    <div class="wrap">
      <div>
        <div class="block">
          <span class="rogers">Rogers&nbsp;</span><span class="hydraulic">Hydraulic</span>
        </div>
        <div class="sub">&amp; Equipment Services</div>
      </div>
      <div class="spacer"></div>
      <div class="promise">On-Site. After Hours. Back to Work.</div>
      <div class="area">Serving Madison County, Brazos County &amp; surrounding East Texas</div>
      <div class="svc">Mobile Hydraulic Hose Repair · Field Service · Trailer Repair · After-Hours</div>
    </div>
  </body>
</html>
